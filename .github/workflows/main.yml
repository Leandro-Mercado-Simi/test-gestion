name: Validar HTML en cada Push

# 1. Definir los eventos que activan el workflow
on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'dev-*'
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # 2. Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Instalar HTMLHint
      - name: Install HTMLHint
        run: npm install -g htmlhint

      # 4. Validar archivos HTML
      - name: Lint HTML files
        run: |
          # Busca todos los archivos .html y los valida
          htmlhint "**/*.html"
